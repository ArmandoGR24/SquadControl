services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: scuad-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    depends_on:
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: scuad-nginx
    ports:
      - "9090:9090"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  redis:
    image: redis:7-alpine
    container_name: scuad-redis
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    container_name: scuad-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  node:
    image: node:20-alpine
    container_name: scuad-node
    working_dir: /var/www/html
    command: sh -c "npm install; npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
    depends_on:
      - app

